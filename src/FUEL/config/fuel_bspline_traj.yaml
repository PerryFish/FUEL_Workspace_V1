fuel_ros2:
  ros__parameters:
    planner_backend: "mvp"

    bspline_traj:
      enable_bspline_traj: false
      use_bspline_for_stable_output: false
      input_path_topic: "/fuel/path_searching/path"
      algorithm: "uniform_bspline_lite"
      spline_order: 3
      sample_dt: 0.1
      control_point_spacing: 0.5
      max_velocity: 3.0
      max_acceleration: 2.0
      safety_distance: 0.35
      collision_check_resolution: 0.1
      allow_path_as_trajectory_fallback: true
      debug_publish_rate: 2.0

